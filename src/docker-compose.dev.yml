services:
  backend:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: marketplace-backend
    working_dir: /app
    volumes:
      - ./backend/marketplace-mps-api:/app
      - ~/.m2:/root/.m2
    command: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev -Dspring-boot.run.fork=false
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: restart
          path: ./backend/marketplace-mps-api/src
        - action: restart
          path: ./backend/marketplace-mps-api/pom.xml

  postgres:
    image: postgres:15
    container_name: dev-ominimarket-postgres
    environment:
      POSTGRES_DB: dev_ominimarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d dev_ominimarket' ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-ominimarket-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@dev.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_SERVER_JSON_FILE: /pgadmin/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: 'True'
    ports:
      - '5050:80'
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
