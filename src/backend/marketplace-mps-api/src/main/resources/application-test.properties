spring.application.name=marketplace-mps-api
spring.config.import=optional:file:.env[properties]

# atualiza as tabelas automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true 

# configuração de conexão com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5435/dev_ominimarket
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Swagger
# URL para acessar a interface
springdoc.swagger-ui.path=/swagger-ui.html
# Pacote base onde ele vai procurar os controllers
springdoc.packagesToScan=com.ufpb.mps.makertplace

# JWT
jwt.secret=super_fantastico_amigo_marketplace_mps_2026